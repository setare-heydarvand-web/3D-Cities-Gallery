<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *,
        *::before,
        *::after {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: gray;
        }

        .gallery3d {

            width: 100%;

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            background: #111;

            perspective: 1200px;



            >.circle {

                width: 450px;

                height: 450px;

                position: relative;

                transform-style: preserve-3d;

                transition: 50s;



                &:hover {

                    transform: rotateY(360deg);

                }



                >figure {

                    width: 180px;

                    height: 250px;

                    position: absolute;

                    left: 50%;

                    top: 50%;

                    margin-left: -90px;

                    margin-top: -125px;

                    overflow: hidden;

                    border-radius: 20px;

                    box-shadow: 0 20px 40px rgba(0, 0, 0, .35);

                    transition: .6s;



                    >img {

                        width: 100%;

                        height: 100%;

                        object-fit: cover;

                        transition: .6s;

                    }



                    &:hover {

                        transform: scale(1.1) translateZ(40px);

                    }

                }



                >figure:nth-of-type(1) {

                    transform: rotateY(0deg) translateZ(300px);

                }

                >figure:nth-of-type(2) {

                    transform: rotateY(45deg) translateZ(300px);

                }

                >figure:nth-of-type(3) {

                    transform: rotateY(90deg) translateZ(300px);

                }

                >figure:nth-of-type(4) {

                    transform: rotateY(135deg) translateZ(300px);

                }

                >figure:nth-of-type(5) {

                    transform: rotateY(180deg) translateZ(300px);

                }

                >figure:nth-of-type(6) {

                    transform: rotateY(225deg) translateZ(300px);

                }

                >figure:nth-of-type(7) {

                    transform: rotateY(270deg) translateZ(300px);

                }

                >figure:nth-of-type(8) {

                    transform: rotateY(315deg) translateZ(300px);

                }

            }

        }
    </style>
</head>

<body>
    <section class="gallery3d">

        <div class="circle">

            <figure><img src="img/img1.jpg" alt=""></figure>
            <figure><img src="img/img2.jpg" alt=""></figure>
            <figure><img src="img/img3.jpg" alt=""></figure>
            <figure><img src="img/img4.jpg" alt=""></figure>
            <figure><img src="img/img5.jpg"></figure>
            <figure><img src="img/img6.jpg" alt=""></figure>
            <figure><img src="img/img7.jpg" alt=""></figure>
            <figure><img src="img/img8.jpg" alt=""></figure>

        </div>

    </section>
</body>

</html>
